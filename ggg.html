<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard Redesign</title>
    <!-- Tailwind CSS for rapid, professional styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            900: '#070B14', // Deepest background
                            800: '#0F1629', // Card backgrounds
                            700: '#1A233A', // Lighter borders/hover
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Styles for Unique Flair */
        body {
            background-color: #070B14;
            color: #94a3b8;
            position: relative;
        }

        /* Subtle animated background grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at top, black 20%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Ambient glow spots */
        .glow-spot-1 {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .glow-spot-2 {
            position: fixed;
            top: 20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(15, 22, 41, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #070B14;
        }
        ::-webkit-scrollbar-thumb {
            background: #1A233A;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2d3b5e;
        }

        /* Floating Notification Button */
        .floating-notif {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 22, 41, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-right: none;
            padding: 1rem 0.75rem;
            border-radius: 16px 0 0 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
            z-index: 50;
        }

        .floating-notif:hover {
            background: rgba(30, 41, 59, 0.9);
            padding-right: 1.25rem;
        }

        .floating-notif .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        /* Pulse animation for the notification badge */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .pulse-badge {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

    <!-- Ambient Background Elements -->
    <div class="bg-grid"></div>
    <div class="glow-spot-1"></div>
    <div class="glow-spot-2"></div>

    <!-- Floating Notification Bar -->
    <div class="floating-notif group" onclick="toggleNotifications()">
        <div class="relative">
            <i data-lucide="bell" class="w-6 h-6 text-indigo-400 group-hover:text-indigo-300 transition-colors"></i>
            <span class="badge pulse-badge"></span>
        </div>
        <span class="text-[10px] font-bold tracking-widest text-slate-400 group-hover:text-slate-200 transition-colors" style="writing-mode: vertical-rl; transform: rotate(180deg);">NOTIF</span>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 lg:px-12 lg:py-16 min-h-screen flex flex-col gap-10">
        
        <!-- Header Section -->
        <header class="flex flex-col gap-2 relative z-10">
            <div class="flex items-center gap-3 text-xs font-bold tracking-widest text-slate-500 uppercase">
                <i data-lucide="building-2" class="w-4 h-4 text-slate-600"></i>
                <span>Govt. Polytechnic, Beelagi</span>
                <span class="text-slate-700">&bull;</span>
                <span class="text-indigo-400/80">Staff Portal</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight mt-1">
                Staff <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-400 to-cyan-400">Dashboard</span>
            </h1>
        </header>

        <!-- Metrics Grid -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
            
            <!-- Metric Card 1 -->
            <div class="glass-card rounded-2xl p-6 flex items-center gap-6 group">
                <div class="w-16 h-16 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-400 group-hover:bg-indigo-500/20 group-hover:scale-110 transition-all duration-300">
                    <i data-lucide="users" class="w-8 h-8"></i>
                </div>
                <div class="flex flex-col">
                    <h2 class="text-4xl font-extrabold text-white mb-1 tracking-tight">1</h2>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Staff <span class="mx-1 text-slate-600">&bull;</span> Current Branch</p>
                </div>
            </div>

            <!-- Metric Card 2 -->
            <div class="glass-card rounded-2xl p-6 flex items-center gap-6 group">
                <div class="w-16 h-16 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 group-hover:bg-emerald-500/20 group-hover:scale-110 transition-all duration-300">
                    <i data-lucide="presentation" class="w-8 h-8"></i>
                </div>
                <div class="flex flex-col">
                    <h2 class="text-4xl font-extrabold text-white mb-1 tracking-tight">1</h2>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Active Teachers</p>
                </div>
            </div>

        </section>

        <!-- Staff List Section -->
        <section class="glass-card rounded-2xl overflow-hidden relative z-10 flex flex-col">
            
            <!-- Section Header -->
            <div class="px-6 py-5 border-b border-white/5 bg-white/[0.02] flex items-center gap-3">
                <i data-lucide="contact" class="w-5 h-5 text-slate-400"></i>
                <h3 class="text-sm font-bold text-slate-200 tracking-widest uppercase">All Staff</h3>
                <span class="px-2.5 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300 text-xs font-bold border border-indigo-500/20">1</span>
            </div>

            <!-- List Container -->
            <div class="p-4 md:p-6">
                <!-- Single Staff Item -->
                <div class="group flex flex-col md:flex-row md:items-center justify-between gap-6 p-4 rounded-xl bg-dark-800/50 border border-transparent hover:border-slate-700/50 hover:bg-dark-700/30 transition-all duration-300">
                    
                    <!-- Left: Identity & Details -->
                    <div class="flex items-center gap-5">
                        <!-- Avatar -->
                        <div class="relative">
                            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 p-[2px]">
                                <div class="w-full h-full rounded-full bg-dark-900 flex items-center justify-center text-white font-bold text-xl">
                                    S
                                </div>
                            </div>
                            <!-- Status Indicator -->
                            <div class="absolute bottom-0 right-0 w-4 h-4 rounded-full bg-emerald-500 border-2 border-dark-900"></div>
                        </div>

                        <!-- Info -->
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center gap-3">
                                <h4 class="text-lg font-bold text-white group-hover:text-indigo-300 transition-colors">Sowrab ha</h4>
                                <span class="flex items-center gap-1.5 px-2 py-0.5 rounded-md bg-emerald-500/10 border border-emerald-500/20 text-[10px] font-bold text-emerald-400 uppercase tracking-wider">
                                    <i data-lucide="database" class="w-3 h-3"></i>
                                    Database
                                </span>
                            </div>
                            <p class="text-sm font-medium text-slate-400 flex items-center flex-wrap gap-2">
                                <span class="text-slate-300 font-mono text-xs bg-white/5 px-1.5 py-0.5 rounded">ID: 787878</span>
                                <span class="text-slate-600">&bull;</span>
                                <span>Fundamentals of Computer</span>
                                <span class="text-slate-600">&bull;</span>
                                <span>Sem 1</span>
                                <span class="text-slate-600">&bull;</span>
                                <span class="text-indigo-200/70">Theory</span>
                            </p>
                        </div>
                    </div>

                    <!-- Right: Actions & Tags -->
                    <div class="flex items-center gap-4 pl-14 md:pl-0">
                        <span class="hidden lg:flex items-center px-3 py-1 rounded-full bg-dark-900 border border-slate-700 text-xs font-semibold text-slate-300 shadow-inner">
                            INFORMATION SCIENCE
                        </span>
                        
                        <button onclick="viewProfile('Sowrab ha')" class="relative overflow-hidden px-6 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold tracking-wider uppercase transition-all duration-300 shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_25px_rgba(79,70,229,0.5)] active:scale-95 flex items-center gap-2">
                            <span>View Profile</span>
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>

                </div>
            </div>

        </section>
        
        <!-- Toast Notification Area (Hidden by default, triggered by JS) -->
        <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    </main>

    <!-- Interactive Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Simple Toast Notification System for Interactivity
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Setup toast styling based on type
            let icon = 'info';
            let colors = 'bg-dark-800 border-indigo-500/30 text-indigo-200';
            
            if (type === 'success') {
                icon = 'check-circle';
                colors = 'bg-dark-800 border-emerald-500/30 text-emerald-200';
            }

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg border shadow-xl transform translate-y-10 opacity-0 transition-all duration-300 ${colors}`;
            toast.style.backdropFilter = "blur(12px)";
            
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">${message}</span>
            `;

            container.appendChild(toast);
            lucide.createIcons();

            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Action Handlers
        function viewProfile(name) {
            showToast(`Loading profile for ${name}...`, 'success');
        }

        function toggleNotifications() {
            showToast('You have no new notifications.', 'info');
            // Remove pulse after checking
            const badge = document.querySelector('.pulse-badge');
            if(badge) {
                badge.classList.remove('pulse-badge');
                badge.style.backgroundColor = '#64748b'; // change to slate
                badge.style.boxShadow = 'none';
            }
        }
    </script>
</body>
</html>
