<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Attendance Analytics</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        bgLight: '#e4ecf3',
                        bgDark: '#d1dce7',
                        cardPink: '#ffe6e8',
                        cardPeach: '#ffefdb',
                        cardBlue: '#eef2fb',
                        darkText: '#1a1a1a',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Gradients to match the reference image closely */
        body {
            background: linear-gradient(135deg, #e4ecf3 0%, #c4d2e0 100%);
            min-height: 100vh;
        }

        .glass-card-main {
            background: linear-gradient(135deg, rgba(255,240,243,0.95) 0%, rgba(255,239,219,0.95) 50%, rgba(238,242,251,0.95) 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.03);
        }

        /* Hide scrollbar for horizontal scrolling areas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .avatar-stack > img {
            margin-left: -12px;
            border: 2px solid white;
            transition: transform 0.2s ease;
        }
        .avatar-stack > img:first-child {
            margin-left: 0;
        }
        .avatar-stack > img:hover {
            transform: translateY(-4px);
            z-index: 20;
        }

        /* Desktop Table Row Hover */
        .table-row-hover:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.002);
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body class="text-darkText font-sans py-8 px-0">

    <!-- Desktop App Container -->
    <main class="w-full min-h-[90vh] relative overflow-hidden flex flex-col xl:flex-row">
        
        <!-- Left Sidebar / Navigation (Desktop) -->
        <aside class="w-full xl:w-64 shrink-0 flex flex-col gap-8 px-4 sm:px-8 pt-0 xl:pt-8">
            <!-- Brand / Logo -->
            <div class="flex items-center gap-3 px-2">
                <div class="w-12 h-12 rounded-full bg-darkText flex items-center justify-center text-white shadow-lg shadow-black/20 shrink-0">
                    <i class="ph ph-moon-stars text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold leading-tight tracking-tight">Attendance<br>Panel</h1>
            </div>

            <!-- Navigation Pills (Vertical on Desktop, Horizontal on Mobile) -->
            <nav class="flex xl:flex-col gap-3 overflow-x-auto xl:overflow-visible no-scrollbar pb-2 xl:pb-0">
                <button class="flex items-center gap-3 bg-darkText text-white px-6 py-3.5 rounded-full text-sm font-medium whitespace-nowrap shadow-md transition-transform hover:scale-105" onclick="switchTab('attendance')">
                    <i class="ph ph-chart-line-up text-lg"></i> Attendance Records
                </button>
                <button class="flex items-center justify-between bg-white/40 backdrop-blur-md px-6 py-3.5 rounded-full text-sm font-medium whitespace-nowrap hover:bg-white/60 transition border border-white/50 group" onclick="switchTab('leave')">
                    <span class="flex items-center gap-3"><i class="ph ph-calendar-x text-lg text-gray-500 group-hover:text-darkText transition-colors"></i> Leave Records</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col gap-8 w-full px-4 sm:px-8 pb-8">
            
            <!-- Top Header -->
            <header class="flex justify-between items-end gap-4 flex-wrap">
                <div>
                    <h2 class="text-4xl md:text-5xl font-semibold leading-tight tracking-tight">Your<br>Analytics</h2>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative hidden sm:block">
                        <i class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 text-lg"></i>
                        <input type="text" id="globalSearchInput" placeholder="Search records..." class="w-64 bg-white/40 backdrop-blur-md border border-white/60 rounded-full py-3 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-black/10 transition shadow-sm placeholder-gray-500 text-darkText">
                    </div>
                    <button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-darkText shadow-sm hover:bg-white/60 transition">
                        <i class="ph ph-bell text-xl"></i>
                    </button>
                </div>
            </header>

            <!-- Attendance Tab Content -->
            <div id="attendanceTab" class="flex flex-col gap-8 w-full">
                <!-- Dashboard Widgets Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 w-full">
                    
                    <!-- Main Analytics Card (Spans 2 columns) -->
                    <div class="lg:col-span-2 glass-card-main rounded-[2.5rem] p-8 relative overflow-hidden group">
                        <!-- Top area: Avatars & Menu -->
                        <div class="flex justify-between items-start mb-8">
                            <div class="flex items-center">
                                <div id="teacherAvatarStack" class="flex avatar-stack">
                                    <!-- Teacher avatars populated by JS -->
                                </div>
                            </div>
                            <button class="w-12 h-12 rounded-full bg-white/30 flex items-center justify-center text-darkText hover:bg-white/60 transition backdrop-blur-sm" onclick="loadAttendanceData()">
                                <i class="ph ph-arrows-clockwise text-2xl"></i>
                            </button>
                        </div>

                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-6">
                            <div>
                                <p class="text-gray-600 text-sm font-medium mb-2 tracking-wide uppercase" id="lastUpdate">Updated now</p>
                                <h3 class="text-3xl md:text-4xl font-semibold leading-tight">Daily Attendance<br>Performance</h3>
                            </div>
                            <div class="text-right flex items-baseline gap-2">
                                <span class="text-5xl font-light tracking-tighter" id="totalCount">0</span>
                                <span class="text-lg font-medium text-gray-600">Total</span>
                            </div>
                        </div>

                        <!-- Inner Stats Cards -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="glass-panel rounded-3xl p-5 border-white/80">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-10 h-10 rounded-full bg-[#ffefdb] flex items-center justify-center text-amber-600">
                                        <i class="ph ph-check-circle text-xl"></i>
                                    </div>
                                    <span class="text-sm font-medium text-gray-700">Present Today</span>
                                </div>
                                <div class="flex items-end justify-between">
                                    <p class="text-4xl font-light" id="presentCount">0</p>
                                    <span class="text-green-600 text-sm font-semibold bg-green-100/80 px-3 py-1 rounded-full" id="presentPercent">0%</span>
                                </div>
                            </div>

                            <div class="glass-panel rounded-3xl p-5 border-white/80">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-10 h-10 rounded-full bg-[#fdf0f3] flex items-center justify-center text-pink-500">
                                        <i class="ph ph-x-circle text-xl"></i>
                                    </div>
                                    <span class="text-sm font-medium text-gray-700">Absent Today</span>
                                </div>
                                <div class="flex items-end justify-between">
                                    <p class="text-4xl font-light" id="absentCount">0</p>
                                    <span class="text-gray-500 text-sm font-semibold bg-gray-100/80 px-3 py-1 rounded-full" id="absentPercent">0%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Secondary Card (Pie Chart) -->
                    <div class="glass-panel rounded-[2.5rem] p-8 flex flex-col items-center justify-center">
                        <div class="w-full flex justify-between items-center mb-6">
                            <h3 class="text-xl font-semibold">Overview</h3>
                            <i class="ph ph-chart-pie-slice text-gray-500 text-xl"></i>
                        </div>
                        <div class="relative w-full max-w-[240px] aspect-square flex items-center justify-center">
                            <canvas id="attendancePieChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Full Width Data List Section -->
                <section class="pb-12 w-full">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-semibold">All Attendance Records</h3>
                        <div class="flex gap-3">
                            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-darkText hover:bg-white/60 transition" onclick="loadAttendanceData()">
                                <i class="ph ph-arrows-clockwise text-lg"></i>
                            </button>
                            <button class="bg-darkText text-white px-5 py-2.5 rounded-full text-sm font-medium hover:opacity-90 transition shadow-md flex items-center gap-2">
                                Export <i class="ph ph-download-simple"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Desktop Table Header (Hidden on small screens) -->
                    <div class="hidden md:grid grid-cols-12 gap-4 px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                        <div class="col-span-4">Teacher Profile</div>
                        <div class="col-span-3">Date</div>
                        <div class="col-span-2">Time</div>
                        <div class="col-span-2">Status</div>
                        <div class="col-span-1 text-right">Actions</div>
                    </div>

                    <!-- List Container -->
                    <div id="attendanceList" class="space-y-3">
                        <!-- Data populated by JS -->
                    </div>
                </section>
            </div>

            <!-- Leave Tab Content -->
            <div id="leaveTab" class="flex flex-col gap-8 hidden w-full">
                <section class="pb-12 w-full">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-semibold">Leave Records</h3>
                        <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-darkText hover:bg-white/60 transition" onclick="loadLeaveData()">
                            <i class="ph ph-arrows-clockwise text-lg"></i>
                        </button>
                    </div>

                    <div id="leaveList" class="space-y-3">
                        <!-- Data populated by JS -->
                    </div>
                </section>
            </div>

        </div>
    </main>

    <script>
        // API Base
        const API_BASE = 'https://jss-railway-fresh-production.up.railway.app/api';

        let attendanceData = [];
        let leaveData = [];
        let pieChart = null;

        // Determine gender from teacher name
        function detectGender(name) {
            const femaleNames = ['seni', 'nad', 'girl', 'priya', 'anjali', 'meera', 'sara', 'neha', 'seema', 'ritu', 'amita', 'pooja', 'divya', 'isha', 'kavya', 'nisha', 'sneha', 'ananya', 'aisha', 'maya', 'shruti', 'zara', 'sophia', 'emma', 'olivia', 'ava', 'isabella', 'mia', 'charlotte', 'amelia'];
            const nameLower = (name || '').toLowerCase().trim();
            return femaleNames.some(fName => nameLower.includes(fName)) ? 'female' : 'male';
        }

        // Create avatar HTML with gender-based styling
        function createAvatarElement(name) {
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            const gender = detectGender(name);
            
            let bgColor, textColor;
            if (gender === 'female') {
                bgColor = 'bg-pink-400';
                textColor = 'text-white';
            } else {
                bgColor = 'bg-blue-500';
                textColor = 'text-white';
            }
            
            return `
                <div class="w-12 h-12 rounded-full ${bgColor} ${textColor} flex items-center justify-center shadow-sm font-semibold text-sm border-2 border-white flex-shrink-0" title="${name}">
                    ${initials}
                </div>
            `;
        }

        // Populate teacher avatars in the header
        function populateTeacherAvatars(records) {
            const avatarStack = document.getElementById('teacherAvatarStack');
            const uniqueTeachers = [...new Set(records.map(r => r.teacher_name))].slice(0, 4);
            
            avatarStack.innerHTML = uniqueTeachers.map(name => createAvatarElement(name)).join('');
        }

        // Determine gender from teacher name
        function detectGender(name) {
            const femaleNames = ['seni', 'nad', 'girl', 'priya', 'anjali', 'meera', 'sara', 'neha', 'seema', 'ritu', 'amita', 'pooja', 'divya', 'isha', 'kavya', 'nisha', 'sneha', 'ananya', 'aisha', 'maya', 'shruti', 'zara', 'sophia', 'emma', 'olivia', 'ava', 'isabella', 'mia', 'charlotte', 'amelia'];
            const nameLower = (name || '').toLowerCase().trim();
            return femaleNames.some(fName => nameLower.includes(fName)) ? 'female' : 'male';
        }

        // Create avatar HTML with gender-based styling
        function createAvatarElement(name) {
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            const gender = detectGender(name);
            
            let bgColor, textColor;
            if (gender === 'female') {
                bgColor = 'bg-pink-400';
                textColor = 'text-white';
            } else {
                bgColor = 'bg-blue-500';
                textColor = 'text-white';
            }
            
            return `
                <div class="w-12 h-12 rounded-full ${bgColor} ${textColor} flex items-center justify-center shadow-sm font-semibold text-sm border-2 border-white flex-shrink-0" title="${name}">
                    ${initials}
                </div>
            `;
        }

        // Populate teacher avatars in the header
        function populateTeacherAvatars(records) {
            const avatarStack = document.getElementById('teacherAvatarStack');
            const uniqueTeachers = [...new Set(records.map(r => r.teacher_name))].slice(0, 4);
            
            avatarStack.innerHTML = uniqueTeachers.map(name => createAvatarElement(name)).join('');
        }

        // Switch between tabs
        function switchTab(tab) {
            document.getElementById('attendanceTab').classList.toggle('hidden', tab !== 'attendance');
            document.getElementById('leaveTab').classList.toggle('hidden', tab !== 'leave');
            
            if(tab === 'attendance') {
                loadAttendanceData();
            } else {
                loadLeaveData();
            }
        }

        // Load Attendance Data from API
        async function loadAttendanceData() {
            try {
                console.log('📍 Fetching attendance records...');
                const response = await fetch(`${API_BASE}/settings/teacher_attendance`);
                const result = await response.json();
                
                let records = [];
                if (result && result.data) {
                    if (typeof result.data === 'string') {
                        records = JSON.parse(result.data).records || [];
                    } else if (result.data.records) {
                        records = result.data.records;
                    }
                }
                
                attendanceData = records;
                console.log('✅ Loaded records:', records.length);
                
                populateTeacherAvatars(records);
                updateAttendanceStats(records);
                renderAttendanceList(records);
                updatePieChart(records);
                
            } catch (error) {
                console.error('❌ Error loading attendance:', error);
            }
        }

        // Load Leave Data from API
        async function loadLeaveData() {
            try {
                console.log('🏖️ Fetching leave records...');
                const response = await fetch(`${API_BASE}/settings/teacher_leave`);
                const result = await response.json();
                
                let records = [];
                if (result && result.data) {
                    if (typeof result.data === 'string') {
                        records = JSON.parse(result.data).records || [];
                    } else if (result.data.records) {
                        records = result.data.records;
                    }
                }
                
                leaveData = records;
                console.log('✅ Loaded leave records:', records.length);
                
                renderLeaveList(records);
                
            } catch (error) {
                console.error('❌ Error loading leave:', error);
            }
        }

        // Update Attendance Stats
        function updateAttendanceStats(records) {
            const present = records.filter(r => r.status === 'present').length;
            const absent = records.filter(r => r.status === 'absent').length;
            const total = records.length;
            
            document.getElementById('presentCount').textContent = present;
            document.getElementById('absentCount').textContent = absent;
            document.getElementById('totalCount').textContent = total;
            
            document.getElementById('presentPercent').textContent = total > 0 ? Math.round((present/total)*100) + '%' : '0%';
            document.getElementById('absentPercent').textContent = total > 0 ? Math.round((absent/total)*100) + '%' : '0%';
        }

        // Create list item
        function createListItem(record) {
            const isPresent = record.status === 'present';
            const statusColor = isPresent ? 'text-green-700 bg-green-100/80 border-green-300' : 'text-red-700 bg-red-100/80 border-red-300';
            const statusIcon = isPresent ? 'ph-check-circle' : 'ph-x-circle';
            const date = record.date || new Date(record.timestamp).toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'});
            const time = record.time || new Date(record.timestamp).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
            const initials = record.teacher_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            const gender = detectGender(record.teacher_name);
            const avatarBg = gender === 'female' ? 'bg-pink-400' : 'bg-blue-500';

            return `
                <div class="glass-panel rounded-2xl p-4 md:px-6 md:py-4 flex flex-col md:grid md:grid-cols-12 gap-4 items-start md:items-center table-row-hover transition-all duration-300 border-white/60">
                    
                    <!-- Profile Column -->
                    <div class="md:col-span-4 flex items-center gap-4 w-full">
                        <div class="w-12 h-12 rounded-full ${avatarBg} text-white flex items-center justify-center font-semibold text-sm border-2 border-white shadow-sm shrink-0 flex-shrink-0">
                            ${initials}
                        </div>
                        <div>
                            <h4 class="font-semibold text-lg leading-tight">${record.teacher_name || 'Unknown'}</h4>
                            <p class="text-xs text-gray-500 font-medium">${record.branch || 'General'}</p>
                        </div>
                    </div>
                    
                    <!-- Date Column -->
                    <div class="md:col-span-3 text-sm font-medium text-gray-700 flex items-center gap-2">
                        <i class="ph ph-calendar-blank text-gray-400 text-lg hidden md:block"></i>
                        ${date}
                    </div>
                    
                    <!-- Time Column -->
                    <div class="md:col-span-2 text-sm font-medium text-gray-700 flex items-center gap-2">
                        <i class="ph ph-clock text-gray-400 text-lg hidden md:block"></i>
                        ${time}
                    </div>
                    
                    <!-- Status Column -->
                    <div class="md:col-span-2 w-full md:w-auto mt-2 md:mt-0">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold tracking-wider border ${statusColor} shadow-sm">
                            <i class="ph ${statusIcon} text-base"></i> ${record.status.toUpperCase()}
                        </span>
                    </div>

                    <!-- Actions Column -->
                    <div class="md:col-span-1 flex justify-end w-full md:w-auto mt-2 md:mt-0">
                        <button class="w-10 h-10 rounded-full bg-white/50 hover:bg-white flex items-center justify-center text-gray-600 transition shadow-sm border border-white/60">
                            <i class="ph ph-caret-right text-lg"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // Render Attendance List
        function renderAttendanceList(records, filterText = '') {
            const listContainer = document.getElementById('attendanceList');
            listContainer.innerHTML = '';
            
            const filtered = records.filter(r =>
                (r.teacher_name || '').toLowerCase().includes(filterText.toLowerCase()) ||
                (r.branch || '').toLowerCase().includes(filterText.toLowerCase())
            );

            if(filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="glass-panel rounded-3xl text-center py-16 text-gray-500 border-dashed border-2 border-white/50">
                        <i class="ph ph-magnifying-glass text-5xl mb-4 opacity-50"></i>
                        <p class="text-lg font-medium text-darkText">No records found</p>
                    </div>`;
                return;
            }

            filtered.forEach((record, index) => {
                setTimeout(() => {
                    listContainer.innerHTML += createListItem(record);
                }, index * 50);
            });
        }

        // Render Leave List
        function renderLeaveList(records) {
            const listContainer = document.getElementById('leaveList');
            listContainer.innerHTML = '';
            
            if(records.length === 0) {
                listContainer.innerHTML = `
                    <div class="glass-panel rounded-3xl text-center py-16 text-gray-500 border-dashed border-2 border-white/50">
                        <i class="ph ph-calendar-blank text-5xl mb-4 opacity-50"></i>
                        <p class="text-lg font-medium text-darkText">No leave records</p>
                    </div>`;
                return;
            }

            records.forEach((record, index) => {
                const initials = record.teacher_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                const gender = detectGender(record.teacher_name);
                const avatarBg = gender === 'female' ? 'bg-pink-400' : 'bg-blue-500';
                const leaveItem = `
                    <div class="glass-panel rounded-2xl p-4 md:px-6 md:py-4 flex flex-col md:grid md:grid-cols-12 gap-4 items-start md:items-center table-row-hover transition-all duration-300 border-white/60">
                        <div class="md:col-span-4 flex items-center gap-4 w-full">
                            <div class="w-12 h-12 rounded-full ${avatarBg} text-white flex items-center justify-center font-semibold text-sm border-2 border-white shadow-sm shrink-0 flex-shrink-0">
                                ${initials}
                            </div>
                            <div>
                                <h4 class="font-semibold text-lg leading-tight">${record.teacher_name || 'Unknown'}</h4>
                                <p class="text-xs text-gray-500 font-medium">${record.leave_type || 'Leave'}</p>
                            </div>
                        </div>
                        <div class="md:col-span-3 text-sm font-medium text-gray-700">${record.start_date || 'N/A'}</div>
                        <div class="md:col-span-2 text-sm font-medium text-gray-700">${record.end_date || 'N/A'}</div>
                        <div class="md:col-span-2">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold tracking-wider border text-amber-700 bg-amber-100/80 border-amber-300 shadow-sm">
                                <i class="ph ph-hourglass-medium text-base"></i> ${record.status || 'PENDING'}
                            </span>
                        </div>
                        <div class="md:col-span-1"></div>
                    </div>
                `;
                listContainer.innerHTML += leaveItem;
            });
        }

        // Update Pie Chart
        function updatePieChart(records) {
            const present = records.filter(r => r.status === 'present').length;
            const absent = records.filter(r => r.status === 'absent').length;
            const late = records.filter(r => r.status === 'late').length;
            
            if(pieChart) pieChart.destroy();
            
            const ctx = document.getElementById('attendancePieChart').getContext('2d');
            pieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Present', 'Absent', 'Late'],
                    datasets: [{
                        data: [present, absent, late],
                        backgroundColor: [
                            '#22c55e',
                            '#ef4444',
                            '#f59e0b'
                        ],
                        borderWidth: 0,
                        hoverOffset: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                padding: 25,
                                font: {
                                    family: "'Outfit', 'sans-serif",
                                    size: 13,
                                    weight: '500'
                                },
                                color: '#4b5563'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#1a1a1a',
                            bodyColor: '#1a1a1a',
                            borderColor: 'rgba(0,0,0,0.1)',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            font: {
                                family: "'Outfit', 'sans-serif",
                                size: 14
                            }
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        // Search functionality
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('globalSearchInput');
            if(searchInput) {
                searchInput.addEventListener('input', (e) => {
                    renderAttendanceList(attendanceData, e.target.value);
                });
            }
            
            // Initial load
            loadAttendanceData();
            
            // Auto refresh every 10 seconds
            setInterval(loadAttendanceData, 10000);
        });
    </script>
</body>
</html>
